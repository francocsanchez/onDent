services:
  mongo:
    image: mongo:8.0
    restart: unless-stopped
    volumes:
      - ${MONGO_DATA_DIR:-./.docker/mongo}:/data/db
    networks:
      - ondent_network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  server:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_MONGO: ${DATABASE_MONGO:-mongodb://mongo:27017/ondent}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
      DEFAULT_USER_PASSWORD: ${DEFAULT_USER_PASSWORD:-Temp1234!}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-OnDent}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@localhost}
    ports:
      - "127.0.0.1:${API_PORT:-4000}:4000"
    networks:
      - ondent_network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  front:
    build:
      context: ./front
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FRONT_PORT:-8080}:80"
    networks:
      - ondent_network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ondent_network:
    driver: bridge
