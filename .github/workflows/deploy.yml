name: Build and Publish Docker Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: prep
        run: |
          echo "image_owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "image_repo=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.image_owner }}/${{ steps.prep.outputs.image_repo }}-backend:latest
            ghcr.io/${{ steps.prep.outputs.image_owner }}/${{ steps.prep.outputs.image_repo }}-backend:${{ steps.prep.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./front
          file: ./front/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: |
            ghcr.io/${{ steps.prep.outputs.image_owner }}/${{ steps.prep.outputs.image_repo }}-frontend:latest
            ghcr.io/${{ steps.prep.outputs.image_owner }}/${{ steps.prep.outputs.image_repo }}-frontend:${{ steps.prep.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=frontend
